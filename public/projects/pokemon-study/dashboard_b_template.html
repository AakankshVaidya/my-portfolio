<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="pageTitle">Investment Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #FFFFFF;
    --bg-soft: #F7F8FA;
    --bg-softer: #FAFBFC;
    --bg-card: #FFFFFF;
    --border: #EAEDF0;
    --border-strong: #D5DAE0;
    --text: #0B0E13;
    --text-dim: #4A5159;
    --text-mute: #7A8189;
    --text-faint: #B0B6BD;
    --accent: #00C805;
    --accent-deep: #00A704;
    --accent-bg: rgba(0, 200, 5, 0.08);
    --negative: #FF4747;
    --warning: #FF9500;
    --warning-bg: rgba(255, 149, 0, 0.10);
    --danger: #FF3B30;
    --danger-bg: rgba(255, 59, 48, 0.08);

    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 32px 64px;
  }
  @media (max-width: 1000px) {
    .app { padding: 20px 20px 48px; }
  }

  /* ============ TOP BAR ============ */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .brand-logo {
    font-family: var(--font-sans);
    font-size: 18px; font-weight: 700;
    color: var(--accent-deep);
    letter-spacing: -0.4px;
  }
  .updated {
    font-size: 13px; color: var(--text-mute); font-weight: 500;
  }

  /* ============ TWO-COLUMN HERO + HIGHLIGHTS ============ */
  .top-row {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 32px;
    margin-bottom: 32px;
  }
  @media (max-width: 920px) {
    .top-row { grid-template-columns: 1fr; gap: 20px; }
  }

  .hero { margin-bottom: 0; }
  .hero-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .hero-image {
    width: 32px; height: 32px;
    border-radius: 8px; overflow: hidden;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    cursor: zoom-in;
    transition: transform 0.15s;
  }
  .hero-image:hover { transform: scale(1.08); }
  .hero-image img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .hero-symbol {
    font-family: var(--font-sans);
    font-size: 13px; font-weight: 600; color: var(--text-mute);
    letter-spacing: 0.4px;
  }
  .hero-name {
    font-size: 24px; font-weight: 700;
    color: var(--text);
    letter-spacing: -0.6px;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .hero-tags { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .tag {
    font-size: 12px; font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .tag::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .tag.oop { color: var(--danger); background: var(--danger-bg); }
  .tag.rotated { color: var(--warning); background: var(--warning-bg); }
  .tag.in-print { color: var(--accent-deep); background: var(--accent-bg); }
  .tag.legal { color: var(--text-mute); background: var(--bg-soft); }
  .tag.product-type { color: var(--text-mute); background: var(--bg-soft); }

  .hero-price {
    font-family: var(--font-sans);
    font-size: 56px; font-weight: 700;
    color: var(--text);
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 12px;
  }
  .hero-change {
    display: flex; align-items: center; gap: 10px;
    font-size: 16px; font-weight: 600;
    flex-wrap: wrap;
  }
  .hero-change-num { color: var(--accent-deep); }
  .hero-change-pct {
    background: var(--accent-bg);
    color: var(--accent-deep);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 14px; font-weight: 600;
  }
  .hero-change-period { color: var(--text-mute); font-weight: 500; }

  /* ============ TIME RANGE TOGGLE ============ */
  .range-toggle {
    display: flex; gap: 4px;
    margin: 24px 0 12px;
    padding: 4px;
    background: var(--bg-soft);
    border-radius: 10px;
    width: fit-content;
  }
  .range-btn {
    background: none; border: none;
    padding: 6px 14px;
    font-family: var(--font-sans);
    font-size: 13px; font-weight: 600;
    color: var(--text-mute);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .range-btn:hover:not(:disabled) { color: var(--text); }
  .range-btn.active { background: var(--bg); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .range-btn:disabled { color: var(--text-faint); cursor: not-allowed; opacity: 0.5; }

  .chart-wrap { height: 240px; position: relative; margin-bottom: 32px; }
  .chart-wrap.small { height: 180px; margin-bottom: 16px; }

  /* ============ HIGHLIGHTS CARD ============ */
  .highlights {
    background: var(--bg-soft);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 0;
    height: fit-content;
  }
  .highlights-title {
    font-size: 13px; font-weight: 600;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 14px;
  }
  .highlights-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .highlights-list li {
    font-size: 14px; line-height: 1.5;
    color: var(--text);
    font-weight: 500;
    padding-left: 22px;
    position: relative;
  }
  .highlights-list li::before {
    content: '';
    position: absolute; left: 0; top: 9px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-mute);
  }

  /* ============ SECTIONS ============ */
  .section { margin-top: 40px; }
  .section-title {
    font-size: 20px; font-weight: 700;
    color: var(--text);
    letter-spacing: -0.4px;
    margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .section-subtitle { font-size: 14px; color: var(--text-mute); font-weight: 500; }

  /* ============ STAT CARDS GRID ============ */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .stat { background: var(--bg); padding: 16px 20px; display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-size: 13px; color: var(--text-mute); font-weight: 500; }
  .stat-value {
    font-size: 16px; font-weight: 600;
    color: var(--text);
    font-feature-settings: 'tnum';
    font-variant-numeric: tabular-nums;
  }
  .stat-value.gain { color: var(--accent-deep); }
  .stat-value.warning { color: var(--warning); }
  .stat-value.danger { color: var(--danger); }

  /* ============ EXPANDABLE DETAIL ============ */
  .detail-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none;
    color: var(--text-mute);
    font-family: var(--font-sans);
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    padding: 8px 0;
    margin-top: 16px;
    transition: color 0.15s;
  }
  .detail-toggle:hover { color: var(--text); }
  .detail-toggle .chev { transition: transform 0.2s; font-size: 11px; }
  .detail-toggle.open .chev { transform: rotate(180deg); }
  .detail-tray { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
  .detail-tray.open { max-height: 3000px; }
  .detail-inner { padding-top: 20px; }

  /* ============ COMPARATIVE BARS ============ */
  .compare { margin-top: 16px; }
  .compare-label {
    font-size: 13px; font-weight: 600;
    color: var(--text-mute);
    margin-bottom: 12px;
  }
  .compare-row {
    display: grid;
    grid-template-columns: 160px 1fr 90px;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .compare-row:last-child { border-bottom: none; }
  .compare-row.current .compare-name { color: var(--text); font-weight: 600; }
  .compare-row.current .compare-bar-fill { background: var(--accent); }
  .compare-row.current .compare-val { color: var(--text); font-weight: 700; }
  .compare-name { color: var(--text-mute); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .compare-bar { height: 6px; background: var(--bg-soft); border-radius: 3px; overflow: hidden; }
  .compare-bar-fill { height: 100%; background: var(--border-strong); border-radius: 3px; transition: width 0.6s ease; }
  .compare-val { color: var(--text-mute); text-align: right; font-family: var(--font-mono); font-weight: 600; }

  /* ============ CHASE CARD GALLERY ============ */
  .gallery {
    display: grid;
    gap: 12px;
    margin-top: 16px;
  }
  .gallery.cols-5 { grid-template-columns: repeat(5, 1fr); }
  .gallery.cols-4 { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 600px) {
    .gallery.cols-5, .gallery.cols-4 { grid-template-columns: repeat(2, 1fr); }
  }
  .gallery-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; flex-direction: column;
    gap: 8px;
  }
  .gallery-card:hover {
    border-color: var(--border-strong);
    transform: translateY(-2px);
  }
  .gallery-card-img {
    width: 100%; aspect-ratio: 2.5 / 3.5;
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg-soft);
    position: relative;
  }
  .gallery-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .gallery-rank {
    position: absolute; top: 6px; left: 6px;
    background: rgba(11, 14, 19, 0.85);
    color: white;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 600;
    padding: 2px 7px;
  }
  .gallery-card-value {
    font-family: var(--font-mono);
    font-size: 13px; font-weight: 700;
    color: var(--accent-deep);
  }
  .gallery-card-name {
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .gallery-card-tier {
    font-size: 10px; font-weight: 600;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    cursor: help;
  }
  .gallery-card-tier.tier-sir { color: #DB2777; }
  .gallery-card-tier.tier-ir { color: #2563EB; }
  .gallery-card-tier.tier-ur { color: #7A8189; }
  .gallery-card-tier.tier-hr { color: #DC2626; }
  .gallery-card-tier.tier-mhr { color: #9333EA; }

  /* ============ IN-TRAY CHART WRAPPER ============ */
  .detail-chart-wrap { height: 200px; position: relative; margin-top: 12px; margin-bottom: 16px; }
  .detail-chart-title {
    font-size: 13px; font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 4px;
    display: flex; align-items: center;
  }

  /* ============ INFO TOOLTIP ICONS ============ */
  .info {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px;
    border: 1px solid var(--text-faint);
    border-radius: 50%;
    color: var(--text-faint);
    font-family: var(--font-sans);
    font-size: 10px; font-weight: 700;
    cursor: help;
    flex-shrink: 0;
    transition: all 0.15s;
    vertical-align: 1px;
    margin-left: 6px;
  }
  .info:hover { color: var(--accent-deep); border-color: var(--accent-deep); }
  .tooltip-bubble {
    position: fixed;
    width: 280px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    box-shadow: 0 8px 24px rgba(11, 14, 19, 0.10), 0 2px 6px rgba(11, 14, 19, 0.06);
    padding: 12px 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 9999;
    display: flex; flex-direction: column; gap: 6px;
  }
  .tooltip-bubble.visible { opacity: 1; }
  .tooltip-title { font-size: 11px; font-weight: 700; color: var(--accent-deep); text-transform: uppercase; letter-spacing: 0.4px; }
  .tooltip-body { font-size: 13px; color: var(--text-dim); line-height: 1.55; }

  /* ============ EXPLAINER BLOCK ============ */
  .explainer {
    background: var(--bg-soft);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-top: 16px;
    font-size: 13px; line-height: 1.5;
    color: var(--text-dim);
  }
  .explainer strong { color: var(--text); font-weight: 600; }

  /* ============ FOOTER ============ */
  .footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-mute);
    display: flex; justify-content: space-between; gap: 16px;
    flex-wrap: wrap;
  }

  /* ============ LIGHTBOX ============ */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(11, 14, 19, 0.85);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 10000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    padding: 24px; cursor: zoom-out;
  }
  .lightbox.visible { opacity: 1; pointer-events: auto; }
  .lightbox img {
    max-width: 90vw; max-height: 90vh;
    object-fit: contain;
    border-radius: 12px;
    transform: scale(0.95);
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .lightbox.visible img { transform: scale(1); }
</style>
</head>

<script>
// ============================================================

function getComparisonRows(metricFn, ascending) {
  const rows = Object.values(DATA.products).map(p => ({
    id: p.id,
    name: p.short_name,
    value: metricFn(p),
  })).filter(r => r.value !== undefined && r.value !== null);
  rows.sort((a, b) => ascending ? a.value - b.value : b.value - a.value);
  const maxVal = Math.max(...rows.map(r => r.value));
  const minVal = Math.min(...rows.map(r => r.value));
  return rows.map(r => ({
    ...r,
    pct: ascending
      ? (minVal === maxVal ? 100 : (minVal / r.value) * 100)
      : (maxVal === 0 ? 0 : (r.value / maxVal) * 100),
    isCurrent: r.id === ACTIVE_PRODUCT_ID,
  }));
}

function renderCompareRows(rows, valueFormatter) {
  return rows.map(r =>
    '<div class="compare-row' + (r.isCurrent ? ' current' : '') + '">' +
    '<span class="compare-name">' + r.name + '</span>' +
    '<div class="compare-bar"><div class="compare-bar-fill" style="width:' + r.pct.toFixed(1) + '%"></div></div>' +
    '<span class="compare-val">' + valueFormatter(r.value) + '</span>' +
    '</div>'
  ).join('');
}

const availableMonths = product.price_history.length - trimmed.firstIdx;
const RANGE_MONTHS = { '6M': 6, '1Y': 12, 'ALL': availableMonths };
const RANGE_LABELS = { '6M': 'past 6 months', '1Y': 'past 12 months', 'ALL': 'all time' };

const heroChangeNum = document.getElementById('heroChangeNum');
const heroChangePct = document.getElementById('heroChangePct');
const heroChangePeriodText = document.getElementById('heroChangePeriodText');

function formatChange(deltaUsd, pct) {
  const arrow = deltaUsd >= 0 ? '▲' : '▼';
  const sign = deltaUsd >= 0 ? '' : '-';
  const pctSign = pct >= 0 ? '+' : '';
  return [
    arrow + ' ' + sign + '$' + Math.abs(deltaUsd).toFixed(2),
    pctSign + pct.toFixed(1) + '%',
  ];
}

function applyRange(range) {
  let n = RANGE_MONTHS[range];
  if (n > availableMonths) n = availableMonths;
  const slicedData = trimmed.data.slice(-n);
  const slicedLabels = trimmed.labels.slice(-n);
  priceChart.data.labels = slicedLabels;
  priceChart.data.datasets[0].data = slicedData;
  priceChart.update('none');

  const current = product.market_price;
  // for ALL with MSRP available, anchor to retail; otherwise anchor to first visible point
  let anchor;
  if (range === 'ALL' && product.msrp) {
    anchor = product.msrp;
  } else {
    anchor = slicedData[0];
  }
  const delta = current - anchor;
  const pct = (delta / anchor) * 100;
  const [numStr, pctStr] = formatChange(delta, pct);
  heroChangeNum.textContent = numStr;
  heroChangePct.textContent = pctStr;
  heroChangePeriodText.textContent = RANGE_LABELS[range];
}

// disable range buttons that exceed available data
document.querySelectorAll('.range-btn').forEach(btn => {
  const range = btn.dataset.range;
  const months = RANGE_MONTHS[range];
  if (months > availableMonths && range !== 'ALL') {
    btn.disabled = true;
    btn.title = 'Only ' + availableMonths + ' months of data available';
  }
  btn.addEventListener('click', () => {
    if (btn.disabled) return;
    applyRange(range);
    document.querySelectorAll('.range-btn').forEach(b => b.classList.toggle('active', b === btn));
  });
});

  new Chart(distCtx, {

            label: (ctx) => {
              if (IS_SEALED) return ctx.parsed.y + '% of top-10 value captured';
              const g = product.grading_economics.grades[ctx.dataIndex];
              return [ctx.parsed.y + '% of outcomes covered', g.value > product.grading_economics.break_even ? 'Profitable outcome' : 'Loss outcome'];
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#B0B6BD', font: { family: 'JetBrains Mono', size: 10 } }, border: { display: false } },
        y: { min: 0, max: 100, grid: { color: '#EAEDF0' }, ticks: { color: '#B0B6BD', font: { family: 'JetBrains Mono', size: 10 }, callback: v => v + '%' }, border: { display: false } }
      }
    }
  });

  // gallery population
  const gal = document.getElementById('chaseGallery');
  if (IS_SEALED) {
    const pullRates = product.pull_rates_by_tier || {};
    product.chase_cards.forEach(card => {
      const tierInfo = TIER_MAP[card.tier] || { short: card.tier, label: card.tier, cls: '' };
      const rate = pullRates[card.tier];
      const tipText = rate
        ? 'Pull rate: ' + rate.specific + ' specific, ' + rate.any + ' any. Card #' + card.number + '.'
        : 'Card #' + card.number;
      const div = document.createElement('div');
      div.className = 'gallery-card';
      div.dataset.zoomable = 'true';
      div.dataset.zoomSrc = card.image;
      div.innerHTML =
        '<div class="gallery-card-img">' +
          '<span class="gallery-rank">#' + card.rank + '</span>' +
          '<img src="' + card.image + '" alt="' + card.name + '" loading="lazy" />' +
        '</div>' +
        '<div class="gallery-card-value">$' + card.value.toFixed(2) + '</div>' +
        '<div class="gallery-card-name">' + card.name + '</div>' +
        '<div class="gallery-card-tier ' + tierInfo.cls + '" data-tip-title="' + tierInfo.label + '" data-tip="' + tipText + '">' + tierInfo.short + (rate ? ' · ' + rate.specific : '') + '</div>';
      gal.appendChild(div);
    });
  } else {
    const grades = product.grading_economics.grades;
    grades.forEach(g => {
      const plSign = g.net_pl >= 0 ? '+' : '−';
      const plColor = g.net_pl >= 0 ? '#00A704' : '#DC2626';
      const tipText = g.description + ' Net P&L vs. $' + product.grading_economics.break_even + ' all-in cost basis: ' + plSign + '$' + Math.abs(g.net_pl) + '.';
      const div = document.createElement('div');
      div.className = 'gallery-card';
      div.dataset.zoomable = 'true';
      div.dataset.zoomSrc = product.box_image;
      div.innerHTML =
        '<div class="gallery-card-img">' +
          '<span class="gallery-rank">#' + g.rank + '</span>' +
          '<img src="' + product.box_image + '" alt="Bubble Mew ' + g.grade + '" loading="lazy" />' +
        '</div>' +
        '<div class="gallery-card-value">$' + g.value.toLocaleString() + '</div>' +
        '<div class="gallery-card-name">' + g.grade + ' · ' + (g.probability * 100).toFixed(0) + '%</div>' +
        '<div class="gallery-card-tier" data-tip-title="' + g.grade + ' — ' + g.tier_label + '" data-tip="' + tipText.replace(/"/g, '&quot;') + '">' +
          '<span style="color: ' + plColor + '; font-weight: 700;">Net ' + plSign + '$' + Math.abs(g.net_pl) + '</span>' +
        '</div>';
      gal.appendChild(div);
    });
  }
}

// ============================================================
// EXPAND TOGGLES
// ============================================================
document.querySelectorAll('.detail-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const targetId = btn.dataset.target;
    const tray = document.getElementById(targetId);
    const isOpen = tray.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    if (isOpen && targetId === 'cultural-detail' && !trendsChartInitialized) {
      initTrendsChart();
      trendsChartInitialized = true;
    }
    if (isOpen && targetId === 'value-detail' && !distChartInitialized) {
      initDistAndCum();
      distChartInitialized = true;
    }
  });
});

// ============================================================
// TOOLTIPS
// ============================================================
let tooltipEl = null;
function ensureTooltip() {
  if (!tooltipEl) {
    tooltipEl = document.createElement('div');
    tooltipEl.className = 'tooltip-bubble';
    tooltipEl.innerHTML = '<div class="tooltip-title"></div><div class="tooltip-body"></div>';
    document.body.appendChild(tooltipEl);
  }
  return tooltipEl;
}
function showTooltip(el) {
  const t = ensureTooltip();
  t.querySelector('.tooltip-title').textContent = el.dataset.tipTitle || '';
  t.querySelector('.tooltip-body').textContent = el.dataset.tip || '';
  t.classList.add('visible');
  const tRect = t.getBoundingClientRect();
  const eRect = el.getBoundingClientRect();
  let top = eRect.top - tRect.height - 8;
  let left = eRect.left + eRect.width / 2 - tRect.width / 2;
  if (top < 8) top = eRect.bottom + 8;
  if (left < 8) left = 8;
  if (left + tRect.width > window.innerWidth - 8) left = window.innerWidth - tRect.width - 8;
  t.style.top = top + 'px';
  t.style.left = left + 'px';
}
function hideTooltip() { if (tooltipEl) tooltipEl.classList.remove('visible'); }
document.addEventListener('mouseenter', (e) => {
  if (e.target.closest && e.target.dataset && e.target.dataset.tipTitle) showTooltip(e.target);
}, true);
document.addEventListener('mouseleave', (e) => {
  if (e.target.closest && e.target.dataset && e.target.dataset.tipTitle) hideTooltip();
}, true);

// ============================================================
// LIGHTBOX
// ============================================================
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
document.addEventListener('click', (e) => {
  const z = e.target.closest('[data-zoomable]');
  if (z) {
    lightboxImg.src = z.dataset.zoomSrc;
    lightbox.classList.add('visible');
    document.body.style.overflow = 'hidden';
  }
});
lightbox.addEventListener('click', () => {
  lightbox.classList.remove('visible');
  document.body.style.overflow = '';
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    lightbox.classList.remove('visible');
    document.body.style.overflow = '';
  }
});

</script>

<script>
// Telemetry: post events to parent window if running in iframe with telemetry=1
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('telemetry') !== '1') return;
  if (window.parent === window) return;  // not in iframe
  function post(event_type, event_target, event_value) {
    try {
      window.parent.postMessage({
        _channel: 'dashboard_event',
        event_type: event_type,
        event_target: event_target,
        event_value: event_value || null,
      }, '*');
    } catch (e) { /* ignore */ }
  }
  // delegate-listen for common interactions
  // click events: tabs, expand toggles, range buttons, chips, chase carousel buttons, gallery cards
  document.addEventListener('click', function(e) {
    const tab = e.target.closest('.tab');
    if (tab) { post('tab_click', tab.dataset.target || tab.textContent.trim(), null); return; }
    const rangeBtn = e.target.closest('.range-btn');
    if (rangeBtn) { post('range_click', rangeBtn.dataset.range || rangeBtn.textContent.trim(), null); return; }
    const detail = e.target.closest('.detail-toggle');
    if (detail) { post('expand_click', detail.dataset.target || '', null); return; }
    const chip = e.target.closest('.chip');
    if (chip) { post('compare_chip_click', (chip.dataset.cmp || '') + ':' + (chip.dataset.chart || ''), null); return; }
    const carBtn = e.target.closest('.carousel-btn');
    if (carBtn) { post('carousel_click', carBtn.id || 'carousel', null); return; }
    const gCard = e.target.closest('.gallery-card');
    if (gCard) { post('gallery_card_click', '', null); return; }
    const zoom = e.target.closest('[data-zoomable]');
    if (zoom) { post('image_zoom', zoom.dataset.zoomSrc || '', null); return; }
  });
  // tooltip hovers: emit one event per hover with duration
  const hoverStart = new WeakMap();
  document.addEventListener('mouseenter', function(e) {
    if (e.target.dataset && e.target.dataset.tipTitle) {
      hoverStart.set(e.target, performance.now());
    }
  }, true);
  document.addEventListener('mouseleave', function(e) {
    if (e.target.dataset && e.target.dataset.tipTitle) {
      const start = hoverStart.get(e.target);
      if (start) {
        const duration = Math.round(performance.now() - start);
        if (duration > 200) {  // ignore drive-by hovers
          post('tooltip_hover', e.target.dataset.tipTitle || '', { duration_ms: duration });
        }
        hoverStart.delete(e.target);
      }
    }
  }, true);
  // section visibility: emit when each section becomes visible
  // (used by both Style A which has sections, and Style B which has sections too)
  const seenSections = new Set();
  const sectionObs = new IntersectionObserver(function(entries) {
    entries.forEach(function(en) {
      if (en.isIntersecting && !seenSections.has(en.target)) {
        seenSections.add(en.target);
        const sectionName = en.target.id || en.target.querySelector('.section-title')?.textContent?.trim() || '';
        post('section_first_view', sectionName, null);
      }
    });
  }, { threshold: 0.25 });
  // observe after a brief delay so DOM is populated
  setTimeout(function() {
    document.querySelectorAll('.section').forEach(function(s) { sectionObs.observe(s); });
  }, 500);
  // page loaded event
  post('dashboard_ready', window.location.search, null);
})();
</script>
