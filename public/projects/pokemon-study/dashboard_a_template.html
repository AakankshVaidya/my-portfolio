<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="pageTitle">Investment Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --surface: #09090b;
    --surface-1: #111114;
    --surface-2: #18181c;
    --surface-3: #1f1f25;
    --border: #27272e;
    --border-bright: #35353f;
    --text: #fafafa;
    --text-dim: #a1a1aa;
    --text-faint: #71717a;
    --text-mute: #52525b;
    --primary: #0C5CAB;
    --primary-bright: #1e75d4;
    --primary-glow: rgba(30, 117, 212, 0.15);
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --gain: #10b981;
    --loss: #ef4444;
    --rotated: #f59e0b;
    --oop: #ef4444;
    --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
    --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px; --s-5: 24px; --s-6: 32px; --s-7: 48px;
    --radius-sm: 6px; --radius: 10px; --radius-lg: 14px;
    --cmp-1: rgba(168, 162, 158, 0.7);
    --cmp-2: rgba(148, 163, 184, 0.7);
    --cmp-3: rgba(212, 184, 154, 0.7);
    --cmp-4: rgba(156, 163, 175, 0.7);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--surface);
    background-image:
      radial-gradient(ellipse 1200px 600px at 50% -200px, var(--primary-glow), transparent 70%),
      radial-gradient(ellipse 800px 400px at 100% 30%, rgba(16, 185, 129, 0.04), transparent 60%);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .app { max-width: 1800px; margin: 0 auto; padding: 0 var(--s-5); }
  @media (min-width: 1500px) { .app { padding: 0 var(--s-6); } }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: var(--s-4) 0; border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: baseline; gap: var(--s-4); }
  .brand-logo { font-family: var(--font-mono); font-size: 12px; color: var(--primary-bright); font-weight: 600; letter-spacing: 1px; }
  .brand-divider { color: var(--text-mute); }
  .brand-name { font-size: 13px; color: var(--text-dim); }
  .topbar-right { display: flex; gap: var(--s-5); font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
  .topbar-right span strong { color: var(--text-mute); font-weight: 400; margin-right: 6px; }

  .header { display: grid; grid-template-columns: 140px 1fr auto; gap: var(--s-5); align-items: start; padding: var(--s-6) 0 var(--s-5); }
  .product-image {
    width: 140px; height: 140px;
    background: linear-gradient(135deg, var(--surface-2) 0%, var(--surface-1) 100%);
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; position: relative;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .product-image-actual { width: 100%; height: 100%; object-fit: contain; display: block; }
  .product-image-fallback {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    color: var(--text-mute); font-family: var(--font-mono); font-size: 10px;
    text-align: center; padding: var(--s-3);
  }
  .product-info { padding-top: var(--s-2); }
  .product-info h1 { font-size: 24px; font-weight: 600; color: var(--text); line-height: 1.2; margin-bottom: var(--s-2); letter-spacing: -0.5px; }
  .product-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); display: flex; gap: var(--s-4); margin-bottom: var(--s-3); }
  .product-meta span strong { color: var(--text-mute); font-weight: 400; margin-right: var(--s-1); }
  .badges { display: flex; gap: var(--s-2); margin-top: var(--s-3); flex-wrap: wrap; }
  .badge {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
    padding: 4px 10px; border-radius: 999px; border: 1px solid;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .badge.oop { color: var(--oop); border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.08); }
  .badge.rotated { color: var(--rotated); border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.08); }
  .badge.in-print { color: var(--success); border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.08); }
  .badge.legal { color: var(--text-dim); border-color: var(--border-bright); background: var(--surface-2); }
  .badge.sealed { color: var(--text-dim); border-color: var(--border-bright); background: var(--surface-2); }
  .badge.sealed::before { background: var(--text-mute); }
  .badge.in-print::before, .badge.legal::before { background: currentColor; }

  .price-hero { text-align: right; padding-top: var(--s-2); }
  .price-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: var(--s-2); }
  .price-value { font-family: var(--font-mono); font-size: 42px; font-weight: 600; color: var(--text); line-height: 1; letter-spacing: -1px; }
  .price-cagr { font-family: var(--font-mono); font-size: 14px; color: var(--gain); margin-top: var(--s-3); display: flex; align-items: center; justify-content: flex-end; gap: var(--s-2); }
  .cagr-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: 4px; font-weight: 600; }
  .price-cagr-sub { color: var(--text-mute); font-size: 11px; display: flex; align-items: center; gap: 4px; }

  .tabs {
    display: flex; gap: 2px; padding: var(--s-1);
    border: 1px solid var(--border); border-radius: var(--radius);
    position: sticky; top: var(--s-3); z-index: 50;
    backdrop-filter: blur(20px); background: rgba(17, 17, 20, 0.85);
    margin-bottom: var(--s-5); box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .tab {
    flex: 1; padding: 10px var(--s-3); background: none; border: none;
    color: var(--text-faint); font-family: var(--font-sans); font-size: 12px;
    font-weight: 500; letter-spacing: 0.3px; cursor: pointer; border-radius: 6px;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: var(--s-2);
  }
  .tab:hover { color: var(--text-dim); background: var(--surface-2); }
  .tab.active { color: var(--text); background: var(--primary); box-shadow: 0 2px 8px rgba(12,92,171,0.3); }
  .tab-num { font-family: var(--font-mono); font-size: 10px; opacity: 0.6; }

  .section { margin-bottom: var(--s-5); scroll-margin-top: 80px; }
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: var(--s-3); padding-bottom: var(--s-2); border-bottom: 1px solid var(--border); }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: var(--s-2); }
  .section-title::before { content: attr(data-num); color: var(--primary-bright); font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
  .section-sub { font-family: var(--font-mono); font-size: 11px; color: var(--text-mute); }

  .panel { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s; }
  .panel:hover { border-color: var(--border-bright); }
  .panel-header {
    padding: var(--s-3) var(--s-4); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; background: var(--surface); gap: var(--s-3); flex-wrap: wrap;
  }
  .panel-title { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 6px; }
  .panel-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  .panel-body { padding: var(--s-4); }

  .compare-chips { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; flex-wrap: wrap; }
  .compare-chips-label { color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.6px; margin-right: 4px; }
  .chip {
    padding: 4px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px;
    color: var(--text-faint); cursor: pointer; transition: all 0.15s;
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .chip::before { content: ''; width: 8px; height: 2px; background: var(--text-mute); border-radius: 1px; transition: background 0.15s; }
  .chip:hover { color: var(--text-dim); border-color: var(--border-bright); }
  .chip.active { color: var(--text); background: var(--surface-3); border-color: var(--border-bright); }
  .chip.active::before { background: var(--chip-color, currentColor); }

  .chart-wrap { height: 240px; position: relative; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-3); }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--s-3); }

  .stat-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--s-4); transition: all 0.2s; }
  .stat-card:hover { border-color: var(--border-bright); background: var(--surface-2); }
  .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; margin-bottom: var(--s-2); }
  .stat-value { font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.1; letter-spacing: -0.5px; }
  .stat-value.lg { font-size: 28px; }
  .stat-value.sm { font-size: 16px; }
  .stat-detail { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin-top: var(--s-2); }

  .comp { margin-top: var(--s-3); padding-top: var(--s-3); border-top: 1px dashed var(--border); }
  .comp-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: var(--s-2); }
  .comp-row { display: grid; grid-template-columns: 130px 1fr 70px; align-items: center; gap: var(--s-2); margin-bottom: 5px; font-family: var(--font-mono); font-size: 10px; }
  .comp-row.current .comp-name { color: var(--text); font-weight: 600; }
  .comp-row.current .comp-bar-fill { background: linear-gradient(90deg, var(--primary) 0%, var(--primary-bright) 100%); }
  .comp-row.current .comp-val { color: var(--text); font-weight: 600; }
  .comp-name { color: var(--text-faint); font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .comp-bar { height: 6px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
  .comp-bar-fill { height: 100%; background: var(--text-mute); border-radius: 3px; transition: width 0.6s ease; }
  .comp-val { color: var(--text-faint); text-align: right; font-size: 10px; }

  .value-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: var(--s-3); }
  .ratio-display { text-align: center; padding: var(--s-5) 0; }
  .ratio-num {
    font-family: var(--font-mono); font-size: 56px; font-weight: 700;
    background: linear-gradient(135deg, var(--text) 0%, var(--primary-bright) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1; letter-spacing: -2px;
  }
  .ratio-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 1px; margin-top: var(--s-2); display: inline-flex; align-items: center; gap: 6px; }
  .ratio-context { font-family: var(--font-sans); font-size: 12px; color: var(--text-dim); margin-top: var(--s-4); padding: var(--s-3); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: left; line-height: 1.5; }
  .ratio-context strong { color: var(--text); }

  .distribution-block { margin-top: var(--s-4); padding-top: var(--s-4); border-top: 1px solid var(--border); }
  .distribution-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: var(--s-3); }
  .distribution-title { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 6px; }
  .distribution-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  .distribution-chart-wrap { height: 200px; position: relative; }

  .carousel-wrap { padding: var(--s-3) var(--s-4) var(--s-4); }
  .carousel-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--s-3); gap: var(--s-3); }
  .carousel-pos { font-family: var(--font-mono); font-size: 11px; color: var(--text-mute); }
  .carousel-pos strong { color: var(--text); font-size: 13px; }
  .carousel-btns { display: flex; gap: var(--s-2); }
  .carousel-btn {
    width: 32px; height: 32px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-dim);
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .carousel-btn:hover { color: var(--text); background: var(--surface-3); border-color: var(--border-bright); }
  .carousel-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .chase-card {
    text-align: center; padding: var(--s-3) var(--s-4) var(--s-4);
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    transition: opacity 0.18s ease, transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: opacity, transform;
  }
  .chase-card.slide-out-left { opacity: 0; transform: translateX(-40px); }
  .chase-card.slide-out-right { opacity: 0; transform: translateX(40px); }
  .chase-card.slide-in-from-left { opacity: 0; transform: translateX(-40px); }
  .chase-card.slide-in-from-right { opacity: 0; transform: translateX(40px); }
  .chase-card.settled { opacity: 1; transform: translateX(0); }
  .chase-meta-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .chase-img {
    width: 280px; height: 392px; margin: 0 auto var(--s-3);
    border-radius: 12px; overflow: hidden; position: relative;
    box-shadow: 0 16px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
    background: linear-gradient(145deg, #2a2438 0%, #1a1530 100%);
  }
  @media (min-width: 1500px) { .chase-img { width: 320px; height: 448px; } }
  .chase-img-actual { width: 100%; height: 100%; object-fit: contain; display: block; transition: transform 0.3s ease; }
  .chase-card:hover .chase-img-actual { transform: scale(1.03); }
  .chase-img-fallback { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; color: var(--text-mute); font-family: var(--font-mono); font-size: 10px; text-align: center; padding: var(--s-3); line-height: 1.4; }
  .chase-rank { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: var(--s-2); }
  .chase-rank strong { color: var(--primary-bright); font-weight: 600; }
  .chase-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .chase-num { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-bottom: var(--s-3); }
  .chase-tier {
    display: inline-block;
    font-family: var(--font-mono); font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--warning);
    border: 1px solid rgba(245,158,11,0.4); background: rgba(245,158,11,0.08);
    padding: 2px 8px; border-radius: 999px; margin-bottom: var(--s-3); cursor: help;
    transition: filter 0.15s;
  }
  .chase-tier:hover { filter: brightness(1.15); }
  .chase-tier.tier-mhr { color: #c084fc; border-color: rgba(192,132,252,0.4); background: rgba(192,132,252,0.08); }
  .chase-tier.tier-hr { color: #f472b6; border-color: rgba(244,114,182,0.4); background: rgba(244,114,182,0.08); }
  .chase-tier.tier-ir { color: #60a5fa; border-color: rgba(96,165,250,0.4); background: rgba(96,165,250,0.08); }
  .chase-tier.tier-ur { color: #a3a3a3; border-color: rgba(163,163,163,0.4); background: rgba(163,163,163,0.08); }
  .chase-value { font-family: var(--font-mono); font-size: 26px; font-weight: 600; color: var(--gain); }
  .chase-context { font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); margin-top: var(--s-2); }

  .carousel-dots { display: flex; justify-content: center; gap: 5px; margin-top: var(--s-3); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--surface-3); cursor: pointer; transition: all 0.15s; }
  .dot.active { background: var(--primary-bright); width: 18px; border-radius: 3px; }
  .dot:hover { background: var(--text-mute); }

  .info {
    display: inline-flex; align-items: center; justify-content: center;
    width: 13px; height: 13px; border: 1px solid var(--text-mute);
    border-radius: 50%; color: var(--text-mute);
    font-family: var(--font-mono); font-size: 9px; font-weight: 600;
    cursor: help; transition: all 0.15s; flex-shrink: 0;
  }
  .info:hover { border-color: var(--primary-bright); color: var(--primary-bright); }

  .tooltip-bubble {
    position: fixed; width: 280px;
    background: var(--surface-3); border: 1px solid var(--border-bright);
    border-radius: var(--radius-sm); box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    padding: 10px 12px; opacity: 0; pointer-events: none;
    transition: opacity 0.15s; z-index: 9999;
    display: flex; flex-direction: column; gap: 6px;
  }
  .tooltip-bubble.visible { opacity: 1; }
  .tooltip-bubble-title { font-family: var(--font-mono); font-size: 9px; font-weight: 600; color: var(--primary-bright); text-transform: uppercase; letter-spacing: 0.8px; }
  .tooltip-bubble-body { font-family: var(--font-sans); font-size: 11px; font-weight: 400; color: var(--text); line-height: 1.45; }

  [data-zoomable] { cursor: zoom-in; transition: filter 0.15s; }
  [data-zoomable]:hover { filter: brightness(1.08); }
  .lightbox {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center;
    z-index: 10000; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; padding: var(--s-5); cursor: zoom-out;
  }
  .lightbox.visible { opacity: 1; pointer-events: auto; }
  .lightbox img {
    max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 12px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
    transform: scale(0.95);
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .lightbox.visible img { transform: scale(1); }
  .lightbox-close {
    position: absolute; top: var(--s-5); right: var(--s-5);
    width: 36px; height: 36px;
    background: var(--surface-3); border: 1px solid var(--border-bright);
    border-radius: 50%; color: var(--text);
    font-family: var(--font-mono); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .lightbox-close:hover { background: var(--surface-2); transform: scale(1.05); }

  .footer { margin-top: var(--s-7); padding-top: var(--s-4); border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); display: flex; justify-content: space-between; }
  .grading-pl-gain { color: var(--gain); font-weight: 600; }
  .grading-pl-loss { color: var(--loss); font-weight: 600; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand">
      <span class="brand-logo">PKMN.INVEST</span>
      <span class="brand-divider">/</span>
      <span class="brand-name" id="brandSubname">Analytics</span>
    </div>
    <div class="topbar-right">
      <span><strong>TICKER</strong><span id="topbarTicker">—</span></span>
      <span><strong>RELEASED</strong><span id="topbarReleased">—</span></span>
      <span><strong>UPDATED</strong>2026-05-20</span>
    </div>
  </div>

  <div class="header">
    <div class="product-image" id="productImageWrap">
      <img id="productImage" alt="" class="product-image-actual" />
      <div class="product-image-fallback">[Product Image]</div>

// ============================================================
// COMPARISON HELPERS — given a metric, returns sorted rows for compare bars
// ============================================================
function getComparisonRows(metricFn, ascending = false) {
  // metricFn: (product) => number
  // ascending: true means smaller is "better"/leading
  const rows = Object.values(DATA.products).map(p => ({
    id: p.id,
    name: p.short_name,
    value: metricFn(p),
  })).filter(r => r.value !== undefined && r.value !== null);
  rows.sort((a, b) => ascending ? a.value - b.value : b.value - a.value);
  const maxVal = Math.max(...rows.map(r => r.value));
  const minVal = Math.min(...rows.map(r => r.value));
  return rows.map(r => ({
    ...r,
    pct: ascending
      ? (minVal === maxVal ? 100 : (minVal / r.value) * 100)  // inverse: smallest gets 100%
      : (maxVal === 0 ? 0 : (r.value / maxVal) * 100),
    isCurrent: r.id === ACTIVE_PRODUCT_ID,
  }));
}

function renderCompareRows(rows, valueFormatter) {
  return rows.map(r => 
    '<div class="comp-row' + (r.isCurrent ? ' current' : '') + '">' +
    '<span class="comp-name">' + r.name + '</span>' +
    '<div class="comp-bar"><div class="comp-bar-fill" style="width:' + r.pct.toFixed(1) + '%"></div></div>' +
    '<span class="comp-val">' + valueFormatter(r.value) + '</span>' +
    '</div>'
  ).join('');
}
</script>

// trim leading nulls in the price array so the chart starts at first real data point
function trimLeading(arr) {
  const firstIdx = arr.findIndex(v => v !== null);
  if (firstIdx <= 0) return { data: arr, labels: CHART_LABELS_FULL };
  return { data: arr.slice(firstIdx), labels: CHART_LABELS_FULL.slice(firstIdx) };
}

priceGrad.addColorStop(1, 'rgba(30, 117, 212, 0)');

const priceChart = new Chart(priceCtx, {
  type: 'line',
  data: {
    labels: priceData.labels,
    datasets: [{
      label: product.short_name,
      data: priceData.data,
      borderColor: '#1e75d4',
      backgroundColor: priceGrad,

// ============================================================

document.querySelectorAll('.chip').forEach(chip => {

<script>
// ============================================================
// DISTRIBUTION + CUMULATIVE CHARTS (Section 5)
// CAROUSEL (chase cards for sealed, grade ladder for single card)
// ============================================================
const items = isSealed ? product.chase_cards : product.grading_economics.grades;
const pullRates = product.pull_rates_by_tier || {};

const distCtx = document.getElementById('distributionChart').getContext('2d');
const distGrad = distCtx.createLinearGradient(0, 0, 0, 200);
distGrad.addColorStop(0, 'rgba(30, 117, 212, 0.55)');
distGrad.addColorStop(1, 'rgba(30, 117, 212, 0.15)');

function barColors(activeIdx) {
  return items.map((_, i) => i === activeIdx ? '#1e75d4' : distGrad);
}
function barBorders(activeIdx) {
  return items.map((_, i) => i === activeIdx ? '#3b8eef' : 'rgba(30, 117, 212, 0.35)');
}

const distData = isSealed 
  ? items.map(c => c.value)
  : items.map(g => +(g.probability * g.value).toFixed(2));

const distLabels = isSealed
  ? items.map(c => '#' + c.rank)
  : items.map(g => g.grade);

const distChart = new Chart(distCtx, {
  type: 'bar',
  data: {
    labels: distLabels,
    datasets: [{
      data: distData,
      backgroundColor: barColors(0),
      borderColor: barBorders(0),
      borderWidth: 1, borderRadius: 4,
      categoryPercentage: 0.85, barPercentage: 0.85,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    onClick: (evt, els) => { if (els.length > 0) goToCard(els[0].index); },
    onHover: (evt, els) => { evt.native.target.style.cursor = els.length > 0 ? 'pointer' : 'default'; },
    plugins: {
      legend: { display: false },
      tooltip: { ...baseTooltipOpts,
        callbacks: {
          title: ctx => isSealed
            ? '#' + items[ctx[0].dataIndex].rank + ' · ' + items[ctx[0].dataIndex].name
            : items[ctx[0].dataIndex].grade + ' · ' + (items[ctx[0].dataIndex].probability * 100).toFixed(0) + '% likely',
          label: ctx => isSealed
            ? [fmtUsd(items[ctx.dataIndex].value), items[ctx.dataIndex].number]
            : ['Value: ' + fmtUsd(items[ctx.dataIndex].value), 'EV contribution: ' + fmtUsd(items[ctx.dataIndex].probability * items[ctx.dataIndex].value)],
        }
      },
    },
    scales: {
      x: { grid: { display: false }, ticks: { color: '#71717a', font: { family: 'IBM Plex Mono', size: 9 } }, border: { color: '#35353f' } },
      y: { grid: { color: '#27272e', drawTicks: false }, ticks: { color: '#71717a', font: { family: 'IBM Plex Mono', size: 9 }, callback: v => '$' + v }, border: { color: '#35353f' } }
    }
  }
});

function updateDistActive(idx) {
  distChart.data.datasets[0].backgroundColor = barColors(idx);
  distChart.data.datasets[0].borderColor = barBorders(idx);
  distChart.update('none');
}

// Cumulative chart
const cumCtx = document.getElementById('cumulativeChart').getContext('2d');
const cumGrad = cumCtx.createLinearGradient(0, 0, 0, 200);
cumGrad.addColorStop(0, 'rgba(16, 185, 129, 0.4)');
cumGrad.addColorStop(1, 'rgba(16, 185, 129, 0)');

let cumData;
if (isSealed) {
  const tot = items.reduce((s, c) => s + c.value, 0);
  let run = 0;
  cumData = items.map(c => {
    run += c.value;
    return +(run / tot * 100).toFixed(1);
  });
} else {
  const breakEven = product.grading_economics.break_even;
  let cum = 0;
  cumData = items.map(g => {
    cum += g.probability;
    return { pct: +(cum * 100).toFixed(1), profitable: g.value > breakEven };
  });
}

const cumChart = new Chart(cumCtx, {
  type: 'line',
  data: {
    labels: distLabels,
    datasets: [{
      data: isSealed ? cumData : cumData.map(d => d.pct),
      borderColor: '#10b981',
      backgroundColor: cumGrad,
      fill: true, tension: isSealed ? 0.25 : 0.15, borderWidth: 2.5,
      pointRadius: isSealed ? 3 : cumData.map(d => d.profitable ? 7 : 4),
      pointBackgroundColor: isSealed ? '#10b981' : cumData.map(d => d.profitable ? '#10b981' : '#52525b'),
      pointBorderColor: '#09090b', pointBorderWidth: 2, pointHoverRadius: 9,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    onClick: (evt, els) => { if (els.length > 0) goToCard(els[0].index); },
    onHover: (evt, els) => { evt.native.target.style.cursor = els.length > 0 ? 'pointer' : 'default'; },
    plugins: {
      legend: { display: false },
      tooltip: { ...baseTooltipOpts, titleColor: '#10b981',
        callbacks: {
          title: ctx => 'Through ' + distLabels[ctx[0].dataIndex],
          label: ctx => isSealed
            ? ctx.parsed.y + '% of top-10 value captured'
            : [ctx.parsed.y + '% of outcomes covered', cumData[ctx.dataIndex].profitable ? 'Profitable outcome ✓' : 'Loss outcome ✗'],
        }
      },
    },
    scales: {
      x: { grid: { color: '#27272e', drawTicks: false }, ticks: { color: '#71717a', font: { family: 'IBM Plex Mono', size: 9 } }, border: { color: '#35353f' } },
      y: { min: 0, max: 100, grid: { color: '#27272e', drawTicks: false }, ticks: { color: '#71717a', font: { family: 'IBM Plex Mono', size: 9 }, callback: v => v + '%' }, border: { color: '#35353f' } }
    }
  }
});
</script>

<script>
// ============================================================
// CAROUSEL (sealed: chase cards; single card: grade ladder)
// ============================================================
let carouselIdx = 0;
let isAnimating = false;
const cardDisplay = document.getElementById('chase-card-display');
const currentSpan = document.getElementById('carousel-current');
const totalSpan = document.getElementById('carousel-total');
const prevBtn = document.getElementById('carousel-prev');
const nextBtn = document.getElementById('carousel-next');
const dotsContainer = document.getElementById('carousel-dots');

items.forEach((_, i) => {
  const dot = document.createElement('span');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => { if (i !== carouselIdx && !isAnimating) goToCard(i); });
  dotsContainer.appendChild(dot);
});

function cardInnerHTML(item) {
  if (isSealed) {
    const tierInfo = TIER_LABEL_MAP[item.tier] || { label: item.tier, cls: '', short: item.tier };
    const rate = pullRates[item.tier];
    const top10avg = (items.reduce((s, c) => s + c.value, 0) / items.length).toFixed(2);
    const tierTooltipAttrs = rate
      ? 'data-tip-title="' + tierInfo.label + '" data-tip="Approximate pull rate for this tier: ' + rate.specific + ' specific, ' + rate.any + ' any. Sampled from TCGplayer Infinite pack-opening data."'
      : '';
    return `
      <div class="chase-img" data-zoomable="true" data-zoom-src="${item.image}">
        <img class="chase-img-actual" src="${item.image}" alt="${item.name}" loading="eager" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'; this.closest('[data-zoomable]').removeAttribute('data-zoomable');" />
        <div class="chase-img-fallback">${item.name}<br>${item.number}</div>
      </div>
      <div class="chase-meta-block">
        <div class="chase-rank">Rank <strong>#${item.rank}</strong> of ${items.length}</div>
        <div class="chase-name">${item.name}</div>
        <div class="chase-num">${item.number}</div>
        <span class="chase-tier ${tierInfo.cls}" ${tierTooltipAttrs}>${tierInfo.label}</span>
        <div class="chase-value">${fmtUsd(item.value)}</div>
        <div class="chase-context">Top 10 average: <strong style="color:var(--text-dim)">$${top10avg}</strong></div>
      </div>
    `;
  } else {
    const plClass = item.net_pl >= 0 ? 'grading-pl-gain' : 'grading-pl-loss';
    const plSign = item.net_pl >= 0 ? '+' : '−';
    return `
      <div class="chase-img" data-zoomable="true" data-zoom-src="${product.box_image}">
        <img class="chase-img-actual" src="${product.box_image}" alt="${product.short_name} ${item.grade}" loading="eager" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'; this.closest('[data-zoomable]').removeAttribute('data-zoomable');" />
        <div class="chase-img-fallback">${product.short_name}<br>${item.grade}</div>
      </div>
      <div class="chase-meta-block">
        <div class="chase-rank">Grade <strong>${item.grade}</strong> · ${(item.probability * 100).toFixed(0)}% likely</div>
        <div class="chase-name">${item.tier_label}</div>
        <span class="chase-tier" style="cursor:default;">${(item.probability * 100).toFixed(0)}% OUTCOME PROBABILITY</span>
        <div class="chase-value">${fmtUsd(item.value)}</div>
        <div class="chase-context"><span class="${plClass}">Net P&L: ${plSign}$${Math.abs(item.net_pl)}</span> after $${product.grading_economics.grading_fee_all_in} PSA fee</div>
        <div class="chase-context" style="margin-top:8px;line-height:1.4;color:var(--text-dim);font-family:var(--font-sans);text-align:left;padding:8px 4px;">${item.description}</div>
      </div>
    `;
  }
}

function updateUI(newIdx) {
  if (currentSpan) currentSpan.textContent = isSealed ? (newIdx + 1) : items[newIdx].grade;
  prevBtn.disabled = newIdx === 0;
  nextBtn.disabled = newIdx === items.length - 1;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === newIdx));
  updateDistActive(newIdx);
}

cardDisplay.innerHTML = cardInnerHTML(items[0]);
cardDisplay.classList.add('settled');
updateUI(0);

window.goToCard = function(newIdx) {
  if (newIdx === carouselIdx || isAnimating) return;
  if (newIdx < 0 || newIdx >= items.length) return;
  isAnimating = true;
  const goingForward = newIdx > carouselIdx;
  const outClass = goingForward ? 'slide-out-left' : 'slide-out-right';
  const inFromClass = goingForward ? 'slide-in-from-right' : 'slide-in-from-left';
  cardDisplay.classList.remove('settled');
  cardDisplay.classList.add(outClass);
  setTimeout(() => {
    cardDisplay.innerHTML = cardInnerHTML(items[newIdx]);
    cardDisplay.classList.remove(outClass);
    cardDisplay.classList.add(inFromClass);
    void cardDisplay.offsetWidth;
    cardDisplay.classList.remove(inFromClass);
    cardDisplay.classList.add('settled');
    carouselIdx = newIdx;
    updateUI(newIdx);
    setTimeout(() => { isAnimating = false; }, 300);
  }, 180);
};

prevBtn.addEventListener('click', () => goToCard(carouselIdx - 1));
nextBtn.addEventListener('click', () => goToCard(carouselIdx + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goToCard(carouselIdx - 1);
  if (e.key === 'ArrowRight') goToCard(carouselIdx + 1);
});
</script>

<script>
// ============================================================
// TOOLTIPS + LIGHTBOX
// ============================================================
let tooltipEl = null;
function ensureTooltip() {
  if (!tooltipEl) {
    tooltipEl = document.createElement('div');
    tooltipEl.className = 'tooltip-bubble';
    tooltipEl.innerHTML = '<div class="tooltip-bubble-title"></div><div class="tooltip-bubble-body"></div>';
    document.body.appendChild(tooltipEl);
  }
  return tooltipEl;
}
function showTooltip(el) {
  const t = ensureTooltip();
  t.querySelector('.tooltip-bubble-title').textContent = el.dataset.tipTitle || '';
  t.querySelector('.tooltip-bubble-body').textContent = el.dataset.tip || '';
  t.classList.add('visible');
  const tRect = t.getBoundingClientRect();
  const eRect = el.getBoundingClientRect();
  let top = eRect.top - tRect.height - 8;
  let left = eRect.left + eRect.width / 2 - tRect.width / 2;
  if (top < 8) top = eRect.bottom + 8;
  if (left < 8) left = 8;
  if (left + tRect.width > window.innerWidth - 8) left = window.innerWidth - tRect.width - 8;
  t.style.top = top + 'px';
  t.style.left = left + 'px';
}
function hideTooltip() { if (tooltipEl) tooltipEl.classList.remove('visible'); }
document.addEventListener('mouseenter', (e) => {
  if (e.target.closest && e.target.dataset && e.target.dataset.tipTitle) showTooltip(e.target);
}, true);
document.addEventListener('mouseleave', (e) => {
  if (e.target.closest && e.target.dataset && e.target.dataset.tipTitle) hideTooltip();
}, true);

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
document.addEventListener('click', e => {
  const z = e.target.closest('[data-zoomable]');
  if (z) {
    lightboxImg.src = z.dataset.zoomSrc;
    lightbox.classList.add('visible');
    document.body.style.overflow = 'hidden';
  }
});
function closeLightbox() {
  lightbox.classList.remove('visible');
  document.body.style.overflow = '';
}

// ============================================================
// TABS — Scroll-position-driven active tab
// The active section is the lowest section whose top edge has scrolled
// above a threshold line near the top of the viewport (just below the
// sticky tab bar). This is how documentation site nav works (e.g. MDN, React docs)
// and works correctly regardless of section height.
// ============================================================
const tabs = Array.from(document.querySelectorAll('.tab'));
function updateActiveTab() {
  const allSections = Array.from(document.querySelectorAll('.section'));
  // threshold line ~120px below viewport top (below sticky tab bar)
  const threshold = 120;
  let active = allSections[0];
  for (const sec of allSections) {
    const rect = sec.getBoundingClientRect();
    // if this section's top has crossed above the threshold, it (or a later one) is active
    if (rect.top <= threshold) {
      active = sec;
    } else {
      break;
    }
  }
  // edge case: at the very bottom of the page, force the last section active
  if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 50) {
    active = allSections[allSections.length - 1];
  }
  if (active) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.target === active.id));
  }
}
window.addEventListener('scroll', updateActiveTab, { passive: true });
window.addEventListener('resize', updateActiveTab);
updateActiveTab();
</script>


<script>
// Telemetry: post events to parent window if running in iframe with telemetry=1
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('telemetry') !== '1') return;
  if (window.parent === window) return;  // not in iframe
  function post(event_type, event_target, event_value) {
    try {
      window.parent.postMessage({
        _channel: 'dashboard_event',
        event_type: event_type,
        event_target: event_target,
        event_value: event_value || null,
      }, '*');
    } catch (e) { /* ignore */ }
  }
  // delegate-listen for common interactions
  // click events: tabs, expand toggles, range buttons, chips, chase carousel buttons, gallery cards
  document.addEventListener('click', function(e) {
    const tab = e.target.closest('.tab');
    if (tab) { post('tab_click', tab.dataset.target || tab.textContent.trim(), null); return; }
    const rangeBtn = e.target.closest('.range-btn');
    if (rangeBtn) { post('range_click', rangeBtn.dataset.range || rangeBtn.textContent.trim(), null); return; }
    const detail = e.target.closest('.detail-toggle');
    if (detail) { post('expand_click', detail.dataset.target || '', null); return; }
    const chip = e.target.closest('.chip');
    if (chip) { post('compare_chip_click', (chip.dataset.cmp || '') + ':' + (chip.dataset.chart || ''), null); return; }
    const carBtn = e.target.closest('.carousel-btn');
    if (carBtn) { post('carousel_click', carBtn.id || 'carousel', null); return; }
    const gCard = e.target.closest('.gallery-card');
    if (gCard) { post('gallery_card_click', '', null); return; }
    const zoom = e.target.closest('[data-zoomable]');
    if (zoom) { post('image_zoom', zoom.dataset.zoomSrc || '', null); return; }
  });
  // tooltip hovers: emit one event per hover with duration
  const hoverStart = new WeakMap();
  document.addEventListener('mouseenter', function(e) {
    if (e.target.dataset && e.target.dataset.tipTitle) {
      hoverStart.set(e.target, performance.now());
    }
  }, true);
  document.addEventListener('mouseleave', function(e) {
    if (e.target.dataset && e.target.dataset.tipTitle) {
      const start = hoverStart.get(e.target);
      if (start) {
        const duration = Math.round(performance.now() - start);
        if (duration > 200) {  // ignore drive-by hovers
          post('tooltip_hover', e.target.dataset.tipTitle || '', { duration_ms: duration });
        }
        hoverStart.delete(e.target);
      }
    }
  }, true);
  // section visibility: emit when each section becomes visible
  // (used by both Style A which has sections, and Style B which has sections too)
  const seenSections = new Set();
  const sectionObs = new IntersectionObserver(function(entries) {
    entries.forEach(function(en) {
      if (en.isIntersecting && !seenSections.has(en.target)) {
        seenSections.add(en.target);
        const sectionName = en.target.id || en.target.querySelector('.section-title')?.textContent?.trim() || '';
        post('section_first_view', sectionName, null);
      }
    });
  }, { threshold: 0.25 });
  // observe after a brief delay so DOM is populated
  setTimeout(function() {
    document.querySelectorAll('.section').forEach(function(s) { sectionObs.observe(s); });
  }, 500);
  // page loaded event
  post('dashboard_ready', window.location.search, null);
})();
</script>
